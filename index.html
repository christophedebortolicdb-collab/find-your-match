<!DOCTYPE html>
<html>
<head>
  <title>Jeu Mariage</title>
</head>

<body>

<h1>Entre ton code</h1>

<input type="text" id="codeInput" placeholder="Entre ton code">
<button onclick="verifierCode()">Valider</button>

<p id="result"></p>

<script>
const codes = {
  "ABC123": false,
  "TEST01": false,
  "MARIAGE2026": false
};

function verifierCode() {
  const code = document.getElementById("codeInput").value.trim();
  const result = document.getElementById("result");

  if (!codes.hasOwnProperty(code)) {
    result.textContent = "❌ Code invalide";
    return;
  }

  if (codes[code] === true) {
    result.textContent = "⚠️ Code déjà utilisé";
    return;
  }

  codes[code] = true;

  result.textContent = "🎉 Code valide !";
}
</script>

</body>
</html>
